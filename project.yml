name: VoiceInput
options:
  bundleIdPrefix: com.voiceinput
  deploymentTarget:
    macOS: '14.0'
  xcodeVersion: '16.0'

targets:
  VoiceInput:
    type: application
    platform: macOS

    sources:
      - path: Sources/VoiceInputIME
        excludes:
          - IMK  # No longer used
      - path: Resources
        excludes:
          - Info.plist
          - rime
        buildPhase: resources

    postBuildScripts:
      - script: |
          pkill -9 -f VoiceInput 2>/dev/null || true
          echo "Done. Launch VoiceInput.app to test."
        name: Restart App
        basedOnDependencyAnalysis: false

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voiceinput.app
        PRODUCT_NAME: VoiceInput
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Entitlements.plist
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ''
        CODE_SIGN_IDENTITY: '-'
        MACOSX_DEPLOYMENT_TARGET: '14.0'
        SWIFT_VERSION: '5.9'
        GENERATE_INFOPLIST_FILE: false
        SWIFT_OBJC_BRIDGING_HEADER: Sources/VoiceInputIME/SherpaOnnx-Bridging-Header.h

    dependencies:
      - framework: Carbon.framework
        embed: false
      - framework: AVFoundation.framework
        embed: false
      - framework: Speech.framework
        embed: false
      - sdk: libsqlite3.tbd
